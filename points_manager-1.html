<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="포인트 지갑">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f0f">
<title>포인트 지갑</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --bg2: #1a1a1a;
  --bg3: #242424;
  --bg4: #2e2e2e;
  --text: #f0f0f0;
  --text2: #a0a0a0;
  --text3: #606060;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --accent: #c8f135;
  --accent-dim: rgba(200,241,53,0.12);
  --danger: #ff5c5c;
  --danger-dim: rgba(255,92,92,0.12);
  --warn: #ffb347;
  --warn-dim: rgba(255,179,71,0.12);
  --ok: #4cde80;
  --ok-dim: rgba(76,222,128,0.10);
  --radius: 16px;
  --radius-sm: 10px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 20px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── 레이아웃 ── */
#app { display: flex; flex-direction: column; min-height: 100dvh; }

.header {
  padding: calc(var(--safe-top) + 16px) 20px 16px;
  background: var(--bg);
  position: sticky; top: 0; z-index: 50;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.header-row { display: flex; align-items: center; justify-content: space-between; }
.header-title { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
.header-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--bg3); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2); font-size: 16px; transition: background .15s;
}
.icon-btn:active { background: var(--bg4); }

.content { flex: 1; overflow-y: auto; padding: 16px 20px; padding-bottom: calc(var(--safe-bottom) + 80px); }

/* ── 탭바 ── */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(15,15,15,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: var(--safe-bottom);
  z-index: 100;
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 10px 0; cursor: pointer; border: none; background: none;
  color: var(--text3); font-size: 10px; gap: 4px; transition: color .15s;
}
.tab-item.on { color: var(--accent); }
.tab-item svg { width: 22px; height: 22px; }

/* ── 요약 카드 ── */
.summary-hero {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 14px;
}
.summary-total-lbl { font-size: 12px; color: var(--text3); margin-bottom: 6px; }
.summary-total-num { font-size: 32px; font-weight: 600; letter-spacing: -1px; color: var(--text); }
.summary-total-num span { font-size: 16px; color: var(--text3); font-weight: 400; margin-left: 2px; }
.summary-cash { font-size: 14px; color: var(--accent); margin-top: 4px; font-weight: 500; }
.summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
.summary-mini { background: var(--bg3); border-radius: var(--radius-sm); padding: 12px; }
.summary-mini-lbl { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.summary-mini-val { font-size: 15px; font-weight: 600; }

/* ── 소멸 경고 배너 ── */
.expiry-banner {
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
  border: 1px solid;
  animation: pulse-border 2s ease-in-out infinite;
}
.expiry-banner.danger { background: var(--danger-dim); border-color: rgba(255,92,92,0.3); }
.expiry-banner.warn { background: var(--warn-dim); border-color: rgba(255,179,71,0.3); }
@keyframes pulse-border {
  0%,100% { opacity: 1; } 50% { opacity: 0.7; }
}
.expiry-banner-icon { font-size: 20px; flex-shrink: 0; }
.expiry-banner-text { flex: 1; }
.expiry-banner-title { font-size: 13px; font-weight: 600; }
.expiry-banner-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }

/* ── 카테고리 카드 ── */
.cat-section { margin-bottom: 10px; }
.cat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 10px;
  transition: border-color .2s;
}
.cat-card.has-expiry-warn { border-color: rgba(255,179,71,0.4); }
.cat-card.has-expiry-danger { border-color: rgba(255,92,92,0.4); }
.cat-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; cursor: pointer;
  user-select: none;
}
.cat-color-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.cat-info { flex: 1; min-width: 0; }
.cat-name { font-size: 14px; font-weight: 600; }
.cat-pts { font-size: 12px; color: var(--text3); margin-top: 1px; }
.cat-chevron { color: var(--text3); font-size: 16px; transition: transform .2s; }
.cat-card.open .cat-chevron { transform: rotate(180deg); }
.cat-body { display: none; border-top: 1px solid var(--border); }
.cat-card.open .cat-body { display: block; }

.item-row {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; border-bottom: 1px solid var(--border);
}
.item-row:last-of-type { border-bottom: none; }
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-cash { font-size: 11px; color: var(--text3); margin-top: 1px; }
.item-expiry-badge {
  font-size: 10px; font-weight: 600; padding: 2px 7px;
  border-radius: 99px; flex-shrink: 0; white-space: nowrap;
}
.badge-danger { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(255,92,92,0.3); }
.badge-warn { background: var(--warn-dim); color: var(--warn); border: 1px solid rgba(255,179,71,0.3); }
.badge-ok { background: var(--ok-dim); color: var(--ok); border: 1px solid rgba(76,222,128,0.2); }
.badge-none { background: var(--bg3); color: var(--text3); }

.pts-field {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 8px; padding: 6px 10px;
  font-size: 13px; font-weight: 500; color: var(--text);
  width: 100px; text-align: right; font-family: inherit;
  -webkit-appearance: none;
}
.pts-field:focus { outline: none; border-color: var(--accent); }

.del-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; padding: 4px; flex-shrink: 0; }
.del-btn:active { color: var(--danger); }

.add-item-row { display: flex; gap: 8px; padding: 10px 16px; align-items: center; }
.add-item-inp {
  flex: 1; background: var(--bg3); border: 1px dashed var(--border2);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  color: var(--text); font-family: inherit;
}
.add-item-inp:focus { outline: none; border-color: var(--accent); border-style: solid; }
.add-item-btn {
  background: var(--accent-dim); border: 1px solid rgba(200,241,53,0.3);
  border-radius: 8px; padding: 8px 12px; font-size: 12px;
  color: var(--accent); font-weight: 600; cursor: pointer; white-space: nowrap;
}
.add-item-btn:active { background: var(--accent); color: #000; }

/* ── 소멸탭 ── */
.expiry-list-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 10px;
}
.expiry-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
}
.expiry-item:last-child { border-bottom: none; }
.expiry-item-info { flex: 1; min-width: 0; }
.expiry-item-name { font-size: 13px; font-weight: 500; }
.expiry-item-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.expiry-item-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.date-field {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 8px; padding: 5px 8px; font-size: 12px;
  color: var(--text2); font-family: inherit;
  -webkit-appearance: none; appearance: none;
}
.date-field:focus { outline: none; border-color: var(--accent); color: var(--text); }

/* ── 설정탭 ── */
.settings-section { margin-bottom: 20px; }
.settings-title { font-size: 12px; color: var(--text3); letter-spacing: .08em; font-weight: 600; margin-bottom: 10px; }
.settings-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.settings-row {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-bottom: 1px solid var(--border);
}
.settings-row:last-child { border-bottom: none; }
.settings-row-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.settings-row-info { flex: 1; }
.settings-row-name { font-size: 14px; font-weight: 500; }
.settings-row-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
.settings-row-actions { display: flex; gap: 6px; align-items: center; }
.small-btn {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 6px; padding: 5px 10px; font-size: 12px;
  color: var(--text2); cursor: pointer; font-family: inherit;
}
.small-btn:active { background: var(--bg4); }
.danger-btn {
  background: var(--danger-dim); border: 1px solid rgba(255,92,92,0.3);
  border-radius: 6px; padding: 5px 10px; font-size: 12px;
  color: var(--danger); cursor: pointer; font-family: inherit;
}

/* ── 모달 ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 200; display: flex; align-items: flex-end;
  backdrop-filter: blur(4px);
}
.modal {
  background: var(--bg2); border-radius: 20px 20px 0 0;
  width: 100%; padding: 20px 20px calc(var(--safe-bottom) + 20px);
  border-top: 1px solid var(--border2);
  animation: slide-up .25s ease-out;
}
@keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 36px; height: 4px; background: var(--bg4); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
.modal-field-lbl { font-size: 12px; color: var(--text3); margin-bottom: 6px; }
.modal-field {
  width: 100%; background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 10px; padding: 12px; font-size: 14px;
  color: var(--text); font-family: inherit; margin-bottom: 12px;
}
.modal-field:focus { outline: none; border-color: var(--accent); }
.color-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 16px; }
.color-swatch {
  width: 100%; aspect-ratio: 1; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: border-color .15s, transform .1s;
}
.color-swatch.selected { border-color: white; transform: scale(1.15); }
.modal-btn-row { display: flex; gap: 8px; margin-top: 4px; }
.modal-btn {
  flex: 1; padding: 14px; border-radius: 12px; font-size: 15px;
  font-weight: 600; cursor: pointer; font-family: inherit; border: none;
}
.modal-btn.primary { background: var(--accent); color: #000; }
.modal-btn.secondary { background: var(--bg3); color: var(--text2); }
.modal-btn:active { opacity: 0.85; }

/* ── 도넛 차트 ── */
.donut-wrap { display: flex; align-items: center; gap: 16px; margin-top: 14px; }
.legend { display: flex; flex-direction: column; gap: 6px; flex: 1; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.legend-name { flex: 1; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.legend-pct { color: var(--text3); font-size: 11px; }

/* ── 빈 상태 ── */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }
.empty-icon { font-size: 36px; margin-bottom: 10px; }

/* ── 홈화면 가이드 ── */
/* ── 카드 정보 ── */
.card-chip {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; padding: 2px 7px; border-radius: 99px;
  background: var(--bg3); color: var(--text3);
  border: 1px solid var(--border); white-space: nowrap;
  cursor: pointer; margin-top: 3px;
}
.card-chip.has-info { background: rgba(200,241,53,0.08); color: var(--accent); border-color: rgba(200,241,53,0.25); }
.card-detail-modal { overflow-y: auto; max-height: 80dvh; }
.card-preview {
  background: linear-gradient(135deg, var(--card-color, #2a2a2a) 0%, color-mix(in srgb, var(--card-color,#2a2a2a) 60%, #000) 100%);
  border-radius: 14px; padding: 20px; margin-bottom: 16px;
  position: relative; overflow: hidden; min-height: 110px;
}
.card-preview::before {
  content:''; position:absolute; top:-30px; right:-30px;
  width:120px; height:120px; border-radius:50%;
  background:rgba(255,255,255,0.06);
}
.card-preview-alias { font-size:16px; font-weight:600; color:#fff; margin-bottom:4px; }
.card-preview-issuer { font-size:12px; color:rgba(255,255,255,0.6); }
.card-preview-num { font-size:13px; color:rgba(255,255,255,0.8); margin-top:12px; letter-spacing:2px; font-family:monospace; }
.card-preview-memo { font-size:11px; color:rgba(255,255,255,0.5); margin-top:6px; }
.card-color-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.card-color-btn {
  width:28px; height:28px; border-radius:50%; cursor:pointer;
  border:2px solid transparent; transition:transform .1s, border-color .1s; flex-shrink:0;
}
.card-color-btn.selected { border-color:#fff; transform:scale(1.2); }
.modal-divider { height:1px; background:var(--border); margin:12px 0; }
.masked-num { font-family:monospace; letter-spacing:1px; }

.pwa-guide {
  background: var(--accent-dim); border: 1px solid rgba(200,241,53,0.25);
  border-radius: var(--radius); padding: 16px; margin-bottom: 14px;
}
.pwa-guide-title { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.pwa-guide-step { font-size: 12px; color: var(--text2); margin-bottom: 4px; display: flex; gap: 8px; }
.pwa-guide-step span:first-child { color: var(--accent); font-weight: 600; flex-shrink: 0; }
.pwa-guide-close { margin-top: 10px; font-size: 12px; color: var(--text3); cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-row">
      <div>
        <div class="header-title">💰 포인트 지갑</div>
        <div class="header-sub" id="header-sub">오늘도 알뜰하게</div>
      </div>
      <button class="icon-btn" id="add-cat-btn" title="카테고리 추가">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<nav class="tab-bar">
  <button class="tab-item on" data-tab="home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    홈
  </button>
  <button class="tab-item" data-tab="expiry">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    유효기간
  </button>
  <button class="tab-item" data-tab="settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
    설정
  </button>
</nav>

<!-- 모달 -->
<div class="modal-overlay" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal-inner">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>

<script>
const COLORS = ['#c8f135','#4cde80','#38bdf8','#a78bfa','#fb7185','#fb923c','#facc15','#2dd4bf','#e879f9','#94a3b8','#f43f5e','#818cf8'];

const DEFAULT_CATS = [
  { id:'air', name:'항공 마일리지', icon:'✈', color:'#38bdf8', items:[
    {id:'ke', name:'대한항공 KE', pts:0, exp:'', cardInfo:{alias:'',issuer:'대한항공',num:'',memo:'',color:'#1a6fa8'}},
    {id:'oz', name:'아시아나 OZ', pts:0, exp:'', cardInfo:{alias:'',issuer:'아시아나항공',num:'',memo:'',color:'#c0392b'}},
  ]},
  { id:'card', name:'신용카드 포인트', icon:'💳', color:'#a78bfa', items:[
    {id:'hyundai', name:'현대카드', pts:0, exp:'', cardInfo:{alias:'',issuer:'현대카드',num:'',memo:'',color:'#1a1a1a'}},
    {id:'samsung', name:'삼성카드', pts:0, exp:'', cardInfo:{alias:'',issuer:'삼성카드',num:'',memo:'',color:'#1e3a8a'}},
    {id:'kb', name:'KB국민카드', pts:0, exp:'', cardInfo:{alias:'',issuer:'KB국민카드',num:'',memo:'',color:'#78350f'}},
  ]},
  { id:'telecom', name:'통신사 포인트', icon:'📱', color:'#4cde80', items:[
    {id:'skt', name:'SKT T멤버십', pts:0, exp:'', cardInfo:{alias:'',issuer:'SKT',num:'',memo:'',color:'#be123c'}},
    {id:'kt', name:'KT 멤버십', pts:0, exp:'', cardInfo:{alias:'',issuer:'KT',num:'',memo:'',color:'#dc2626'}},
  ]},
  { id:'retail', name:'유통/멤버십', icon:'🛍', color:'#fb923c', items:[
    {id:'lotte', name:'롯데포인트', pts:0, exp:'', cardInfo:{alias:'',issuer:'롯데',num:'',memo:'',color:'#b45309'}},
    {id:'shinsegae', name:'신세계포인트', pts:0, exp:'', cardInfo:{alias:'',issuer:'신세계',num:'',memo:'',color:'#1e3a5f'}},
    {id:'cjone', name:'CJ ONE', pts:0, exp:'', cardInfo:{alias:'',issuer:'CJ',num:'',memo:'',color:'#166534'}},
  ]},
];

const DEFAULT_RATES = {ke:14,oz:14,hyundai:1,samsung:1,kb:1,skt:1,kt:1,lotte:1,shinsegae:1,cjone:1};

function uid(){ return Math.random().toString(36).slice(2,9); }
function fmt(n){ return Math.round(n).toLocaleString('ko-KR'); }
function fmtW(n){ return fmt(n)+'원'; }

let state = {
  cats: [],
  rates: {},
  tab: 'home',
  openCats: {},
  showPwaGuide: true,
};

function loadState(){
  try{
    const s = JSON.parse(localStorage.getItem('pts_app_v3')||'null');
    if(s){ state.cats=s.cats||[]; state.rates=s.rates||{}; state.openCats=s.openCats||{}; state.showPwaGuide=s.showPwaGuide!==undefined?s.showPwaGuide:true; }
    else{ state.cats=JSON.parse(JSON.stringify(DEFAULT_CATS)); state.rates={...DEFAULT_RATES}; }
  }catch(e){ state.cats=JSON.parse(JSON.stringify(DEFAULT_CATS)); state.rates={...DEFAULT_RATES}; }
}

function saveState(){
  try{ localStorage.setItem('pts_app_v3', JSON.stringify({cats:state.cats,rates:state.rates,openCats:state.openCats,showPwaGuide:state.showPwaGuide})); }catch(e){}
}

function getRate(item){ return state.rates[item.id]||state.rates[item.name]||1; }
function itemCash(item){ return (Number(item.pts)||0)*getRate(item); }
function catPts(cat){ return cat.items.reduce((s,i)=>s+(Number(i.pts)||0),0); }
function catCash(cat){ return cat.items.reduce((s,i)=>s+itemCash(i),0); }
function totalPts(){ return state.cats.reduce((s,c)=>s+catPts(c),0); }
function totalCash(){ return state.cats.reduce((s,c)=>s+catCash(c),0); }

function getExpiryStatus(exp){
  if(!exp) return null;
  const diff = (new Date(exp)-new Date())/86400000;
  if(diff<0) return {type:'danger',label:'만료됨',days:Math.ceil(diff)};
  if(diff<30) return {type:'danger',label:`D-${Math.ceil(diff)}`,days:Math.ceil(diff)};
  if(diff<90) return {type:'warn',label:`D-${Math.ceil(diff)}`,days:Math.ceil(diff)};
  return {type:'ok',label:`D-${Math.ceil(diff)}`,days:Math.ceil(diff)};
}

function getUrgentItems(){
  const items=[];
  state.cats.forEach(cat=>cat.items.forEach(item=>{
    const s=getExpiryStatus(item.exp);
    if(s&&(s.type==='danger'||s.type==='warn')) items.push({...item,cat,status:s});
  }));
  return items.sort((a,b)=>a.status.days-b.status.days);
}

function renderExpiry(){
  const allItems = [];
  state.cats.forEach(cat=>cat.items.forEach(item=>{
    allItems.push({...item,cat});
  }));
  allItems.sort((a,b)=>{
    const sa=getExpiryStatus(a.exp), sb=getExpiryStatus(b.exp);
    if(!sa&&!sb) return 0;
    if(!sa) return 1; if(!sb) return -1;
    return sa.days-sb.days;
  });

  const urgent = allItems.filter(i=>{const s=getExpiryStatus(i.exp);return s&&s.type!=='ok';});
  const others = allItems.filter(i=>{const s=getExpiryStatus(i.exp);return !s||s.type==='ok';});

  let html = '';
  if(urgent.length>0){
    html += `<div style="font-size:12px;color:var(--danger);letter-spacing:.08em;font-weight:600;margin-bottom:10px">🚨 주의 필요 (${urgent.length}건)</div>`;
    html += `<div class="expiry-list-card">`;
    urgent.forEach(item=>html+=renderExpiryItem(item));
    html += `</div>`;
  }

  html += `<div style="font-size:12px;color:var(--text3);letter-spacing:.08em;font-weight:600;margin-bottom:10px;margin-top:${urgent.length>0?'16px':'0'}">전체 항목</div>`;
  if(others.length===0&&urgent.length===0){
    html += `<div class="empty-state"><div class="empty-icon">🗓</div><div>등록된 항목이 없어요</div></div>`;
  } else {
    html += `<div class="expiry-list-card">`;
    others.forEach(item=>html+=renderExpiryItem(item));
    html += `</div>`;
  }
  return html;
}

// ─── 이벤트 연결 ───
function attachEvents(){
  // 포인트 입력
  document.querySelectorAll('input[data-ci]').forEach(inp=>{
    inp.addEventListener('change',function(){
      const ci=+this.dataset.ci, ii=+this.dataset.ii;
      state.cats[ci].items[ii].pts = Number(this.value)||0;
      saveState(); render();
    });
  });
  // 환산율
  document.querySelectorAll('input[data-rkey]').forEach(inp=>{
    inp.addEventListener('change',function(){
      state.rates[this.dataset.rkey]=parseFloat(this.value)||1;
      saveState(); render();
    });
  });
  // 유효기간 (유효기간 탭)
  document.querySelectorAll('input[data-catid]').forEach(inp=>{
    inp.addEventListener('change',function(){
      const cat=state.cats.find(c=>c.id===this.dataset.catid);
      if(cat){const item=cat.items.find(i=>i.id===this.dataset.itemid);if(item)item.exp=this.value;}
      saveState(); render();
    });
  });
  // 탭
  document.querySelectorAll('.tab-item').forEach(btn=>{
    btn.onclick=()=>{ state.tab=btn.dataset.tab; document.querySelectorAll('.tab-item').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); render(); };
  });
  // 카테고리 추가
  document.getElementById('add-cat-btn').onclick=()=>showAddCatModal();
  // 도넛
  drawDonut();
}

function drawDonut(){
  const canvas = document.getElementById('donut');
  if(!canvas) return;
  const dpr=window.devicePixelRatio||1;
  canvas.width=90*dpr; canvas.height=90*dpr;
  canvas.style.width='90px'; canvas.style.height='90px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const tp=totalPts(), cx=45, cy=45, R=40, IR=24;
  if(tp===0){
    ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=16; ctx.stroke();
    return;
  }
  let ang=-Math.PI/2;
  state.cats.forEach(cat=>{
    const t=catPts(cat); if(!t) return;
    const sl=(t/tp)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,R,ang,ang+sl); ctx.closePath();
    ctx.fillStyle=cat.color; ctx.fill(); ang+=sl;
  });
  ctx.beginPath(); ctx.arc(cx,cy,IR,0,Math.PI*2);
  ctx.fillStyle='#1a1a1a'; ctx.fill();
}

      <div class="modal-field-lbl">카드사 / 발급사</div>
      <input id="ci-issuer" class="modal-field" type="text" placeholder="예: 현대카드, 대한항공" value="${info.issuer||''}" oninput="previewCardInfo()">

      <div class="modal-field-lbl">카드번호 <span style="color:var(--text3);font-weight:400">(뒷자리 4자리 또는 전체)</span></div>
      <input id="ci-num" class="modal-field" type="text" placeholder="예: 1234 또는 1234-5678-9012-3456"
        value="${info.num||''}" inputmode="numeric" maxlength="19"
        oninput="formatCardNum(this);previewCardInfo()">

      <div class="modal-field-lbl">메모</div>
      <input id="ci-memo" class="modal-field" type="text" placeholder="예: 전월실적 30만원, 해외 캐시백 2%" value="${info.memo||''}" oninput="previewCardInfo()">

      <div class="modal-btn-row">
        <button class="modal-btn secondary" onclick="closeModal()">취소</button>
        <button class="modal-btn primary" onclick="saveCardInfo('${catId}','${itemId}')">저장</button>
      </div>
    </div>
  `);
}

function maskCardNum(num){
  const clean = num.replace(/\D/g,'');
  if(clean.length<=4) return '****'+clean;
  if(clean.length===16){
    return clean.slice(0,4)+'-****-****-'+clean.slice(12);
  }
  return '****-****-****-'+clean.slice(-4);
}

function formatCardNum(inp){
  let v=inp.value.replace(/\D/g,'').slice(0,16);
  inp.value=v.replace(/(.{4})/g,'$1-').replace(/-$/,'');
}

function previewCardInfo(){
  const alias=document.getElementById('ci-alias')?.value||'';
  const issuer=document.getElementById('ci-issuer')?.value||'';
  const num=document.getElementById('ci-num')?.value||'';
  const memo=document.getElementById('ci-memo')?.value||'';
  const colorEl=document.querySelector('.card-color-btn.selected');
  if(colorEl) document.getElementById('ci-preview').style.setProperty('--card-color',colorEl.dataset.color);
  const pa=document.getElementById('ci-prev-alias'); if(pa) pa.textContent=alias||'별칭 없음';
  const pi=document.getElementById('ci-prev-issuer'); if(pi) pi.textContent=issuer;
  const pn=document.getElementById('ci-prev-num'); if(pn) pn.textContent=num?maskCardNum(num.replace(/\D/g,'')):'카드번호 미입력';
  const pm=document.getElementById('ci-prev-memo'); if(pm) pm.textContent=memo;
}

function selectCardColor(el){
  document.querySelectorAll('.card-color-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  previewCardInfo();
}

function saveCardInfo(catId,itemId){
  const cat=state.cats.find(c=>c.id===catId);
  const item=cat?.items.find(i=>i.id===itemId);
  if(!item) return;
  const colorEl=document.querySelector('.card-color-btn.selected');
  item.cardInfo={
    alias: document.getElementById('ci-alias')?.value||'',
    issuer: document.getElementById('ci-issuer')?.value||'',
    num: document.getElementById('ci-num')?.value.replace(/\D/g,'')||'',
    memo: document.getElementById('ci-memo')?.value||'',
    color: colorEl?colorEl.dataset.color:(item.cardInfo?.color||'#2a2a2a'),
  };
  saveState(); closeModal(); render();
}

function editCat(ci){
  const cat=state.cats[ci];
  showModal(`
    <div class="modal-title">카테고리 편집</div>
    <div class="modal-field-lbl">이름</div>
    <input id="ec-name" class="modal-field" type="text" value="${cat.name}">
    <div class="modal-field-lbl">아이콘</div>
    <input id="ec-icon" class="modal-field" type="text" value="${cat.icon}" maxlength="4" style="font-size:22px;text-align:center">
    <div class="modal-field-lbl">색상</div>
    <div class="color-grid">${COLORS.map(c=>`<div class="color-swatch${c===cat.color?' selected':''}" style="background:${c}" data-color="${c}" onclick="selectColor(this)"></div>`).join('')}</div>
    <div class="modal-btn-row">
      <button class="modal-btn secondary" onclick="closeModal()">취소</button>
      <button class="modal-btn primary" onclick="saveCat(${ci})">저장</button>
    </div>
  `);
}

function selectColor(el){
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
  el.classList.add('selected');
}

function saveCat(ci){
  const name=(document.getElementById('ec-name').value||'').trim();
  const icon=(document.getElementById('ec-icon').value||'').trim();
  const colorEl=document.querySelector('.color-swatch.selected');
  if(!name) return;
  state.cats[ci].name=name;
  state.cats[ci].icon=icon||state.cats[ci].icon;
  if(colorEl) state.cats[ci].color=colorEl.dataset.color;
  saveState(); closeModal(); render();
}

function showAddCatModal(){
  showModal(`
    <div class="modal-title">카테고리 추가</div>
    <div class="modal-field-lbl">이름</div>
    <input id="nc-name" class="modal-field" type="text" placeholder="예: 호텔 포인트">
    <div class="modal-field-lbl">아이콘 (이모지)</div>
    <input id="nc-icon" class="modal-field" type="text" placeholder="🏨" maxlength="4" style="font-size:22px;text-align:center">
    <div class="modal-field-lbl">색상</div>
    <div class="color-grid">${COLORS.map((c,i)=>`<div class="color-swatch${i===0?' selected':''}" style="background:${c}" data-color="${c}" onclick="selectColor(this)"></div>`).join('')}</div>
    <div class="modal-btn-row">
      <button class="modal-btn secondary" onclick="closeModal()">취소</button>
      <button class="modal-btn primary" onclick="confirmAddCat()">추가</button>
    </div>
  `);
}

function confirmAddCat(){
  const name=(document.getElementById('nc-name').value||'').trim();
  const icon=(document.getElementById('nc-icon').value||'').trim()||'💰';
  const colorEl=document.querySelector('.color-swatch.selected');
  const color=colorEl?colorEl.dataset.color:COLORS[0];
  if(!name){ alert('이름을 입력해주세요'); return; }
  state.cats.push({id:uid(),name,icon,color,items:[]});
  saveState(); closeModal(); render();
}

function dismissPwa(){ state.showPwaGuide=false; saveState(); render(); }

function showModal(html){
  document.getElementById('modal-content').innerHTML=html;
  document.getElementById('modal').style.display='flex';
}
function closeModal(e){
  if(!e||e.target===document.getElementById('modal'))
    document.getElementById('modal').style.display='none';
}

// ─── 파일 ───
function exportJSON(){
  const data=JSON.stringify({cats:state.cats,rates:state.rates},null,2);
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(data);
  a.download='points_backup.json'; a.click();
}
function importJSON(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const p=JSON.parse(ev.target.result);
      if(p.cats) state.cats=p.cats;
      if(p.rates) state.rates=p.rates;
      saveState(); render(); alert('불러오기 완료!');
    }catch(err){alert('올바른 파일이 아닙니다');}
  };
  reader.readAsText(file);
  e.target.value='';
}
function exportCSV(){
  const rows=[['카테고리','항목명','별칭','카드사','카드번호(마스킹)','메모','포인트','현금환산(원)','유효기간']];
  state.cats.forEach(cat=>cat.items.forEach(item=>{
    const info=item.cardInfo||{};
    const maskedNum=info.num?maskCardNum(info.num):'';
    rows.push([cat.name,item.name,info.alias||'',info.issuer||'',maskedNum,info.memo||'',item.pts||0,Math.round(itemCash(item)),item.exp||'']);
  }));
  const csv='\uFEFF'+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='points.csv'; a.click();
}

// ─── 초기화 ───
loadState();
render();
</script>
</body>
</html>
